<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login System</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Already logged in state -->
<div class="already" id="alreadyLogged" hidden>
  <h2>Already logged in</h2>
  <p>You are already logged in. You can go to the main page or logout.</p>
  <div class="already-actions">
    <button class="btn" id="goHomeBtn">Go to Main Page</button>
    <button class="btn ghost" id="logoutBtn">Logout</button>
  </div>
</div>

<!-- Auth wrapper (login/register) -->
<div class="wrapper">

<span class="bg-animate"></span>
<span class="bg-animate2"></span>

<!-- LOGIN FORM -->

<div class="form-box login">

<h2 class="animation">Login</h2>

<form id="loginForm">

<div class="input-box">
<input type="text" id="loginUsername" required>
<label>Username</label>
<i class="bi bi-person-fill"></i>
</div>

<div class="input-box">
<input type="password" id="loginPassword" required>
<label>Password</label>
<i class="bi bi-file-lock-fill"></i>
</div>

<button type="submit" class="btn">Login</button>

<div class="logreg-link">
<p>Don't have an account ?
<a href="#" class="register-link">Sign Up</a>
</p>
</div>

</form>

</div>

<!-- REGISTER FORM -->

<div class="form-box register">

<h2 class="animation">Sign Up</h2>

<form id="registerForm">

<div class="input-box">
<input type="text" id="regUsername" required>
<label>Username</label>
<i class="bi bi-person-fill"></i>
</div>

<div class="input-box">
<input type="email" id="regEmail" required>
<label>Email</label>
<i class="bi bi-envelope-fill"></i>
</div>

<div class="input-box">
<input type="password" id="regPassword" required>
<label>Password</label>
<i class="bi bi-file-lock-fill"></i>
</div>

<button type="submit" class="btn">Sign Up</button>

<div class="logreg-link">
<p>Already have an account?
<a href="#" class="login-link">Login</a>
</p>
</div>

</form>

</div>

</div>

<!-- Auth logic -->
<script src="app.js"></script>

</body>
</html>
